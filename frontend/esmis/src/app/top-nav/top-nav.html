<!-- Top Nav Container -->
<nav class="top-nav-container">
  <div class="dropdown-container">
    <button class="dropdown-trigger" (click)="toggleDropdown()">
      @if(user()?.role?.role_name?.toLowerCase() === 'superadmin' || 
        user()?.role?.role_name?.toLowerCase() === 'admin') 
      {
        <i class="bi bi-person-circle text-danger"></i>
      } @else {
        <i class="bi bi-person-circle text-primary"></i>
      }
      
      <span class="user-name">
        {{ user()?.first_name }} {{ user()?.last_name }}
      </span>

      <i [class]="isOpen() ? 'bi bi-caret-up-fill' : 'bi bi-caret-down-fill'"></i>
    </button>

    @if(isOpen()) {
    <!-- Dropdown List -->
    <ul class="dropdown-menu" [class.show]="isOpen()">
      <li class="dropdown-item">Account Settings</li>
      <li class="dropdown-item" (click)="logout()">Logout</li>
    </ul>
  }
  </div>
</nav>
