<!-- Offline Overlay -->
<div 
  [class.d-none]="!isOffline()" 
  class="position-fixed top-0 start-0 w-100 h-100 bg-body 
    d-flex flex-column align-items-center justify-content-center text-center p-4" 
    style="z-index: 10000;">
  <div class="mb-4">
    <i class="bi bi-wifi-off text-danger display-1"></i>
  </div>
  <h1 class="fw-bold mb-2">You are Offline</h1>
  <p class="text-secondary mb-0">Please check your internet connection.</p>
</div>

<!-- Loading Bar -->
<ngx-loading-bar color="#FFD700" height="4px"></ngx-loading-bar>
<router-outlet/>
<app-toast-container></app-toast-container>
<app-confirm-modal></app-confirm-modal>
