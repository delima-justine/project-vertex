<div class="sidebar">
  <!-- Header -->
  <div class="header">
    <img src="assets/pup_logo.png" alt="PUP Logo"/>
    <span>SMIS</span>
  </div>

  <!-- Body -->
  <div class="body">
    <div 
      class="nav-link" 
      routerLink="/admin/home"
      routerLinkActive="active">
      <i class="bi bi-house-door-fill"></i>
      <span>Home</span>
    </div>

    <div 
      class="nav-link" 
      routerLink="/admin/user-management"
      routerLinkActive="active">
      <i class="bi bi-people-fill"></i>
      <span>User Management</span>
    </div>

    <div 
      class="nav-link" 
      routerLink="/admin/notifications"
      routerLinkActive="active">
      <i class="bi bi-bell-fill"></i>
      <span>Notifications</span>
    </div>

    <div class="orders-link" (click)="toggleDropdown()">
      <div class="d-flex flex-row gap-2">
        <i class="bi bi-cart-fill"></i>
        <span>Orders</span>
      </div>
      
      <!-- Dropdown Icon -->
      <i [class]="isDropdownOpen() ? 'bi bi-caret-up-fill' : 'bi bi-caret-down-fill'"></i>
    </div>

    @if(isDropdownOpen()) {
      <!-- Hidden Options for Orders -->
      <div class="dropdown-container">
        <div class="new-req dropdown-item" routerLink="/create-request">
          <i class="bi bi-plus-circle-fill"></i>
          <span>Create New Request</span>
        </div>

        <div class="pending-req dropdown-item" routerLink="/pending-requests">
          <i class="bi bi-clock-fill"></i>
          <span>Pending</span>
        </div>

        <div class="approved-req dropdown-item" routerLink="/approved-requests">
          <i class="bi bi-hand-thumbs-up-fill"></i>
          <span>Approved</span>
        </div>

        <div class="released-req dropdown-item" routerLink="/released-requests">
          <i class="bi bi-truck"></i>
          <span>Released</span>
        </div>

        <div class="disapproved-req dropdown-item">
          <i class="bi bi-x-circle-fill"></i>
          <span>Disapproved</span>
        </div>
      </div>
    }
    
    <div 
      class="nav-link" 
      routerLink="/admin/reports"
      routerLinkActive="active">
      <i class="bi bi-graph-up"></i>
      <span>Reports</span>
    </div>

    <div 
      class="nav-link" 
      routerLink="/help"
      routerLinkActive="active">
      <i class="bi bi-question-circle-fill"></i>
      <span>Help & Support</span>
    </div>
  </div>
</div>
