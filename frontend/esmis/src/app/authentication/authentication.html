<main>
  <!-- Login Card -->
  <div class="login-container">
    <div class="card">
      <div class="card-body">
        <img class="pup-logo" src="/assets/pup_logo.png" alt="Logo"/>
        <h6>Supply Management Information System</h6>

        <h5>Login</h5>
        <form [formGroup]="loginForm">
          <input 
            class="form-control mb-2 mt-2"
            type="text" 
            placeholder="Office or Email"
            formControlName="email"/>

          <div class="input-group mb-2">
            <input 
              class="form-control"
              [type]="showPassword() ? 'text' : 'password'" 
              placeholder="Password"
              formControlName="password"/>

            <button 
              type="button"
              class="input-group-text"
              (click)="togglePasswordVisibility()">
              <i [class]="showPassword() ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill'"></i>
            </button>
          </div>

          @if(loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
            <span class="text-danger mb-1 error-message">
              Password is required.
            </span>
          }

          <button 
            class="login-btn btn btn-primary"
            type="button"
            (click)="login()">
              Login
          </button>
        </form>

        @if(isFailed()) {
          <span class="text-danger mt-1 mb-1 error-message">
            Invalid email or password. Please try again.
          </span>
        }

        <!-- Forgot Password -->
        <div class="text-center mt-1">
          <button 
            class="btn btn-link back-btn" 
            (click)="navigateToForgotPassword()">
              Forgot Password
              <i class="bi bi-question-circle"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <!-- <div class="footer-container">
    <p class="fw-bold">SMIS Website</p>
    <p>| Developed by Astral Angels 2025. All Rights Reserved</p>
  </div> -->

  <!-- Notification Modal -->
  <div class="modal fade" id="notifModal-auth" tabindex="-1" aria-labelledby="notifModalLabel-auth" aria-hidden="true">
    <div class="modal-dialog modal-md modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header" [ngClass]="'notif-modal-header-' + notifType()">
          <i class="bi" [ngClass]="'bi-' + notifIcon()" style="margin-right: 8px;"></i>
          <h5 class="modal-title" id="notifModalLabel-auth">{{notifTitle()}}</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <p>{{notifMessage()}}</p>
        </div>
        <div class="modal-footer justify-content-center">
          <button type="button" class="btn" [ngClass]="'notif-modal-btn-' + notifType()" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>
</main>
