<main data-bs-theme="light">
  <div class="login-container">
    <!-- Login Card -->
    <div class="card">
      <div class="card-body">
        <img class="pup-logo" [src]="env.identities.appLogoPath" alt="Logo"/>
        <h6>Supply Management Information System</h6>

        <div class="login-tabs mb-4">
          <ul class="nav nav-pills nav-fill">
            <li class="nav-item">
              <button 
                class="nav-link" 
                [class.active]="loginType() === 'user'"
                (click)="setLoginType('user')">
                User Login
              </button>
            </li>
            <li class="nav-item">
              <button 
                class="nav-link" 
                [class.active]="loginType() === 'admin'"
                (click)="setLoginType('admin')">
                Admin Login
              </button>
            </li>
          </ul>
        </div>

        <!-- <h5>{{ loginType() === 'admin' ? 'Admin Portal' : 'User Portal' }}</h5> -->
        <form [formGroup]="loginForm">
          <input 
            class="form-control mb-2 mt-2"
            type="text" 
            placeholder="Office or Email"
            formControlName="email"/>

          <div class="input-group mb-2">
            <input 
              class="form-control"
              [type]="showPassword() ? 'text' : 'password'" 
              placeholder="Password"
              formControlName="password"/>

            <button 
              type="button"
              class="input-group-text"
              (click)="togglePasswordVisibility()">
              <i [class]="showPassword() ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill'"></i>
            </button>
          </div>

          @if(loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
            <span class="text-danger mb-1 error-message">
              Password is required.
            </span>
          }

          <button 
            class="login-btn btn btn-primary"
            type="button"
            (click)="login()">
              Login
          </button>
        </form>

        @if(isFailed()) {
          <span class="text-danger mt-1 mb-1 error-message">
            {{ errorMessage() }}
          </span>
        }

        <!-- Forgot Password -->
        <div class="text-center mt-1">
          <button 
            class="btn btn-link back-btn" 
            (click)="navigateToForgotPassword()">
              Forgot Password
              <i class="bi bi-question-circle"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>
