<main>
  <!-- Login Card -->
  <div class="login-container">
    <div class="card">
      <div class="card-body">
        <img class="pup-logo" src="/assets/pup_logo.png" alt="Logo"/>
        <h6>Supply Management Information System</h6>

        <h5>Login</h5>
        <input 
          class="form form-control"
          type="text" 
          placeholder="Office or Email"/>

        <input 
          class="form form-control"
          type="password" 
          placeholder="Password"/>

        <button 
          class="btn btn-primary"
          type="button">
            Login
        </button>
      </div>
    </div>
  </div>
</main>
