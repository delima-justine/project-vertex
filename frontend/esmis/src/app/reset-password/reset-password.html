<main>
  <!-- Reset Password Card -->
  <div class="reset-password-container">
    <div class="card">
      <div class="card-body">
        <h5 class="text-center reset-pass-title">Reset Password</h5>
        <p class="reset-pass-info text-secondary">
          Enter your new password below to reset your account password.
        </p>
        <form [formGroup]="resetPasswordForm">
          <div class="mb-3">
            <input 
              type="password" 
              class="form-control" 
              placeholder="Enter new password" 
              formControlName="newPassword" />

            @if(resetPasswordForm.get('newPassword')?.invalid && resetPasswordForm.get('newPassword')?.touched) {
              <span class="text-danger mt-1 error-message">
                Password must be at least 8 characters long.
              </span>
            }
            
          </div>

          <button 
            class="btn btn-primary reset-btn"
            (click)="resetPassword()"
            [disabled]="this.resetPasswordForm.invalid">
              Reset Password
          </button>
        </form>
      </div>
    </div>
  </div>
</main>
