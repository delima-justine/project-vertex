name: Angular CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/esmis/package-lock.json

    - name: Install dependencies
      working-directory: frontend/esmis
      run: npm ci

    - name: Build
      working-directory: frontend/esmis
      run: npm run build -- --configuration production

    - name: Run Tests
      working-directory: frontend/esmis
      run: npm run test -- --no-watch --no-progress --browsers=ChromeHeadless
