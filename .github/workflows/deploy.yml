name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Frontend Build (Angular) ---
      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/esmis/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend/esmis
        run: npm ci

      - name: Build Frontend
        working-directory: frontend/esmis
        run: npm run build -- --configuration production

      # --- Backend Build (Laravel) ---
      - name: Setup PHP (Backend)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, pdo_mysql
          tools: composer

      - name: Install Backend Composer Dependencies
        working-directory: backend/smis
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Build Backend Assets (Vite)
        working-directory: backend/smis
        run: |
          npm ci
          npm run build

      # --- Deployment ---
      
      # Deploy Frontend to /public_html
      - name: Deploy Frontend
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '65002' }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "frontend/esmis/dist/esmis/browser/"
          TARGET: ${{ secrets.REMOTE_TARGET_FRONTEND || 'public_html/' }}
          EXCLUDE: "/dist/, /node_modules/, /api/"

      # Deploy Backend to /public_html/api
      - name: Deploy Backend
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '65002' }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "backend/smis/"
          TARGET: ${{ secrets.REMOTE_TARGET_BACKEND || 'public_html/api/' }}
          EXCLUDE: "/node_modules/, /tests/, /storage/logs/, .env, .git/, /frontend/"

      # Run Remote Post-Deployment Commands
      - name: Run Remote Post-Deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT || '65002' }}
          script: |
            # Navigate to backend directory
            cd ${{ secrets.REMOTE_TARGET_BACKEND || 'public_html/api' }}
            
            # Run Laravel commands
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Ensure storage permissions
            chmod -R 775 storage bootstrap/cache
