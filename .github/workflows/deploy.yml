name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'documents/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'documents/**'
      - '.gitignore'

jobs:
  # 1. Run Angular Tests
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/esmis/package-lock.json
      - name: Install & Test
        working-directory: frontend/esmis
        run: |
          npm ci
          npm run test -- --no-watch --no-progress --browsers=ChromeHeadless

  # 2. Run Laravel Tests
  test-backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, mysql, pdo_mysql, dom, curl
          tools: composer
      - name: Install & Test
        working-directory: backend/smis
        run: |
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password

  # 3. Deploy to Hostinger (ONLY if tests pass AND we are on main branch)
  deploy:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # Build Frontend
      - name: Build Frontend
        working-directory: frontend/esmis
        run: |
          npm ci
          npm run build -- --configuration production
      
      # Build Backend
      - name: Build Backend
        working-directory: backend/smis
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci
          npm run build
      
      # Sync to Hostinger
      - name: Deploy Frontend
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '65002' }}
          SOURCE: "frontend/esmis/dist/esmis/browser/"
          TARGET: ${{ secrets.REMOTE_TARGET_FRONTEND }}
          EXCLUDE: "/api/"

      - name: Deploy Backend
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '65002' }}
          SOURCE: "backend/smis/"
          TARGET: ${{ secrets.REMOTE_TARGET_BACKEND }}
          EXCLUDE: "/node_modules/, .env, .git/"

      # Post-Deploy
      - name: Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT || '65002' }}
          script: |
            cd ${{ secrets.REMOTE_TARGET_BACKEND }}
            php artisan migrate --force
            php artisan config:cache
